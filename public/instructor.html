<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FFFCF5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>讲师 · 621号店</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="toast-container"></div>

<div class="page has-tab-bar" id="app">
  <!-- 页头 -->
  <div class="page-header" style="padding-bottom:8px">
    <div>
      <div class="page-title" id="pageTitle">☕ 讲师控制台</div>
      <div class="page-subtitle" id="pageSubtitle">管理你的场次</div>
    </div>
    <div id="headerActions" style="display:none">
      <button class="btn btn-ghost btn-icon" onclick="copyCode()" title="复制场次码">📋</button>
    </div>
  </div>

  <!-- 场次码 -->
  <div id="codeBanner" style="display:none;margin-bottom:8px">
    <div class="card code-display" style="padding:14px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><span class="label">场次码</span><div class="code" id="sessionCode" style="font-size:30px;letter-spacing:6px;margin:0">0000</div></div>
        <button class="btn btn-primary btn-sm" onclick="copyCode()">复制</button>
      </div>
    </div>
  </div>

  <!-- ===== Tab 1: 场次管理 ===== -->
  <div id="tabSession" class="tab-content" style="display:block">
    <div class="card" style="background:#FAF6EE">
      <div class="input-group">
        <label class="input-label">场次名称</label>
        <input class="input" id="sessionTitle" placeholder="例如：第1期沟通沙龙" value="沟通沙龙">
      </div>
      <button class="btn btn-primary" onclick="createSession()" style="width:100%;margin:0 0 10px 0">创建场次</button>
      <div style="text-align:center;font-size:12px;color:var(--text-muted);margin:4px 0">或</div>
      <button class="btn btn-secondary" onclick="createPresetSession()" style="width:100%;margin:6px 0 0 0">☕ 一键创建「621号店」</button>
    </div>

    <div id="sessionInfo" style="display:none">
      <div class="card">
        <div class="card-header"><div class="card-title">👥 小组管理</div></div>
        <div class="inline-form">
          <input class="input" id="groupInput" placeholder="小组名称" maxlength="20">
          <button class="btn btn-primary btn-sm" onclick="addGroup()">添加</button>
        </div>
        <div id="groupList"></div>
        <div id="groupEmpty" class="empty-state" style="padding:16px"><div class="icon" style="font-size:24px">👥</div><div class="text">暂无小组</div></div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">🎭 角色管理</div></div>
        <div id="rolesContent" style="min-height:40px"><div class="empty-state" style="padding:12px"><div class="text">请先添加小组</div></div></div>
      </div>
    </div>

    <div id="noSessionHint" class="empty-state" style="display:none"><div class="icon">☕</div><div class="text">还没有场次，在上方创建一个吧</div></div>

    <!-- 场次列表 -->
    <div id="sessionListSection" style="margin-top:16px">
      <div style="font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:8px">📋 所有场次</div>
      <div id="sessionList"></div>
    </div>
  </div>

  <!-- ===== Tab 2: 剧本编辑 ===== -->
  <div id="tabScript" class="tab-content" style="display:none">
    <div class="card" style="background:#FAF6EE;margin-bottom:12px">
      <div class="input-group"><label class="input-label">幕次标题</label><input class="input" id="sceneTitle" placeholder="如：第一幕 · 灯还亮着"></div>
      <div class="input-group"><label class="input-label">剧本内容</label><textarea class="input" id="sceneContent" rows="4"></textarea></div>
      <button class="btn btn-primary" onclick="addScene()" style="width:100%;margin:0">添加剧本</button>
    </div>
    <div id="sceneList"></div>
    <div id="sceneEmpty" class="empty-state"><div class="icon">📜</div><div class="text">还没有剧本，在上方添加吧</div></div>
  </div>

  <!-- ===== Tab 3: 推送控制 ===== -->
  <div id="tabControl" class="tab-content" style="display:none">
    <div id="progressBarContainer" style="display:none"><div class="progress-bar" id="progressBar"></div></div>
    <div id="participantSummary" class="card" style="background:#FAF6EE;padding:12px 16px;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:8px">
        <span>👤</span><span style="font-size:14px;color:var(--text-secondary)">已加入</span>
        <span style="font-size:20px;font-weight:700;color:var(--select)" id="participantCount">0</span><span style="font-size:14px;color:var(--text-secondary)">人</span>
      </div>
    </div>
    <div id="participantList"></div>
    <div id="sceneControls" class="scene-controls"></div>
    <div id="sceneControlsEmpty" class="empty-state"><div class="icon">📝</div><div class="text">请先在剧本中添加内容</div></div>
    <button class="btn btn-danger" onclick="endSession()" style="width:100%;margin:16px 0">结束场次</button>
  </div>

  <!-- ===== Tab 4: 设置 ===== -->
  <div id="tabSettings" class="tab-content" style="display:none">
    <div class="card">
      <div class="card-header"><div class="card-title">🔒 修改密码</div></div>
      <div class="input-group"><label class="input-label">新密码</label><input class="input" id="newPwdInput" placeholder="输入新密码" maxlength="20" inputmode="numeric"></div>
      <button class="btn btn-primary" onclick="changePassword()" style="width:100%;margin:0">保存密码</button>
    </div>
    <div class="card">
      <div style="font-size:14px;color:var(--text-secondary);margin-bottom:8px">当前场次码</div>
      <div style="font-size:24px;font-weight:700;letter-spacing:6px;color:var(--select)" id="settingsCode">——</div>
    </div>
  </div>
</div>

<!-- ===== 底部导航 ===== -->
<div class="tab-bar" id="tabBar" style="display:none">
  <button class="tab active" data-tab="tabSession"><span class="tab-icon">📋</span>场次</button>
  <button class="tab" data-tab="tabScript"><span class="tab-icon">📝</span>剧本</button>
  <button class="tab" data-tab="tabControl"><span class="tab-icon">🎮</span>控台</button>
  <button class="tab" data-tab="tabSettings"><span class="tab-icon">⚙️</span>设置</button>
</div>

<!-- 编辑弹窗 -->
<div id="editSceneModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,252,245,0.9);backdrop-filter:blur(6px);z-index:300;align-items:center;justify-content:center;padding:20px" onclick="if(event.target===this)closeEditScene()">
  <div style="background:#fff;border:1.5px solid var(--divider);border-radius:var(--radius);max-width:500px;width:100%;max-height:85vh;overflow-y:auto;padding:24px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-family:var(--font-serif);font-size:18px;font-weight:700">编辑剧本</div>
      <button class="btn btn-ghost btn-icon" onclick="closeEditScene()">✕</button>
    </div>
    <div class="input-group"><label class="input-label">幕次标题</label><input class="input" id="editSceneTitle"></div>
    <div class="input-group"><label class="input-label">公共剧本</label><textarea class="input" id="editSceneContent" rows="6"></textarea></div>
    <div id="editRoleContentList"></div>
    <button class="btn btn-primary" onclick="saveEditScene()" style="width:100%;margin:0">保存修改</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/socket-client.js"></script>
<script src="/js/instructor.js"></script>
</body>
</html>
